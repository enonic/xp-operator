{{- if not .Values.onlyDeployCrds }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
data:
  application.properties: |-
    # Api certificates
    quarkus.http.ssl.certificate.file=/deployments/ssl/tls.crt
    quarkus.http.ssl.certificate.key-file=/deployments/ssl/tls.key

    # Operator identity — used for namespace lifecycle and RBAC management
    operator.operator.name={{ .Release.Name }}
    operator.operator.namespace={{ .Release.Namespace }}
    operator.operator.hazelcastClusterRoleName={{ .Release.Name }}-hazelcast
    operator.charts.values.labelKeys.managed={{ .Values.managedLabelKey }}

    # User defined config
{{ indent 4 .Values.config }}
---
{{- end }}