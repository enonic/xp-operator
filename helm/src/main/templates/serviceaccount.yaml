{{- if not .Values.onlyDeployCrds }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
---
# Minimal ClusterRole for operator - only cluster-scoped permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}
rules:
  # Namespace management - operator creates and manages XP namespaces
  - apiGroups: [ "" ]
    resources: [ "namespaces" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
  # RoleBinding management - operator binds the powerful role per-namespace
  - apiGroups: [ "rbac.authorization.k8s.io" ]
    resources: [ "rolebindings" ]
    verbs: [ "create", "update", "patch", "delete", "get", "list", "watch" ]
  # Bind verb on the powerful ClusterRole - allows delegation without escalation
  - apiGroups: [ "rbac.authorization.k8s.io" ]
    resources: [ "clusterroles" ]
    resourceNames: [ "{{ .Release.Name }}-namespace-role" ]
    verbs: [ "bind" ]
  # CRD watchers - operator watches these resources cluster-wide
  - apiGroups: [ "enonic.cloud" ]
    resources: [ "xp7deployments", "xp7apps", "xp7configs" ]
    verbs: [ "get", "list", "watch", "update", "patch" ]
  - apiGroups: [ "enonic.cloud" ]
    resources: [ "xp7deployments/status", "xp7apps/status", "xp7configs/status" ]
    verbs: [ "get", "update", "patch" ]
  # Pod watching for operator functionality
  - apiGroups: [ "" ]
    resources: [ "pods" ]
    verbs: [ "watch", "list", "get" ]
---
# Powerful ClusterRole for namespaced resources - bound via RoleBinding per namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-namespace-role
rules:
  - apiGroups: [ "" ]
    resources: [ "configmaps", "services", "serviceaccounts", "secrets", "events", "persistentvolumeclaims" ]
    verbs: [ "*" ]
  - apiGroups: [ "apps" ]
    resources: [ "statefulsets" ]
    verbs: [ "*" ]
  - apiGroups: [ "networking.k8s.io" ]
    resources: [ "ingresses" ]
    verbs: [ "*" ]
  - apiGroups: [ "rbac.authorization.k8s.io" ]
    resources: [ "roles", "rolebindings" ]
    verbs: [ "*" ]
  - apiGroups: [ "enonic.cloud" ]
    resources: [ "xp7deployments", "xp7apps", "xp7configs" ]
    verbs: [ "*" ]
  - apiGroups: [ "enonic.cloud" ]
    resources: [ "xp7deployments/status", "xp7apps/status", "xp7configs/status" ]
    verbs: [ "*" ]
  # For Hazelcast cluster discovery
  - apiGroups: [ "" ]
    resources: [ "pods", "endpoints" ]
    verbs: [ "get", "list", "watch" ]
  # ClusterRole/ClusterRoleBinding for Hazelcast node discovery
  - apiGroups: [ "rbac.authorization.k8s.io" ]
    resources: [ "clusterroles", "clusterrolebindings" ]
    verbs: [ "create", "update", "patch", "delete", "get", "list" ]
  - apiGroups: [ "" ]
    resources: [ "nodes" ]
    verbs: [ "get", "list" ]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}
  apiGroup: rbac.authorization.k8s.io
---
{{- end }}
