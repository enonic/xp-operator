{{- if not .Values.onlyDeployCrds }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
---
# Minimal operator ClusterRole — only what the operator process itself needs cluster-wide
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "events", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  # Namespace lifecycle
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "delete"]
  # RBAC management
  # rolebindings: only bootstrap (create xp-operator-namespace-access before namespace-role exists)
  # update/patch/delete in managed namespaces are covered by namespace-role RoleBinding
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["get", "create"]
  # clusterrolebindings: hazelcast CRB lifecycle (create via helm, delete on deployment removal)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterrolebindings"]
    verbs: ["get", "create", "patch", "delete"]
  # clusterroles: bind only for known pre-created ClusterRoles (no escalate needed)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles"]
    resourceNames: ["{{ .Release.Name }}-hazelcast", "{{ .Release.Name }}-namespace-role"]
    verbs: ["bind"]
  # CRD management
  - apiGroups: ["enonic.cloud"]
    resources: ["xp7deployments", "xp7apps", "xp7configs"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
# Namespace-role ClusterRole — pre-created; bound per managed namespace via RoleBinding in ensureNamespaceReady()
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-namespace-role
rules:
  - apiGroups: [""]
    resources: ["configmaps", "services", "serviceaccounts", "secrets", "events", "persistentvolumeclaims"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["*"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["*"]
  - apiGroups: ["enonic.cloud"]
    resources: ["xp7deployments", "xp7apps", "xp7configs"]
    verbs: ["*"]
---
# Hazelcast ClusterRole — pre-created; replaces the runtime-created per-namespace ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-hazelcast
rules:
  - apiGroups: ["*"]
    resources: ["nodes"]
    verbs: ["get"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}
  apiGroup: rbac.authorization.k8s.io
---
{{- end }}
